version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: php_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: kashi
      MYSQL_USER: user2025
      MYSQL_PASSWORD: user2025
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # PHP + Apache web server
  web:
    image: php:8.2-apache
    container_name: php_web
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html/
    depends_on:
      - db
    command: >
      bash -c "docker-php-ext-install mysqli && apache2-foreground"

  # phpMyAdmin (optional - handy for managing the DB)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: php_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: user2025
      PMA_PASSWORD: user2025
    depends_on:
      - db

volumes:
  mysql_data:
